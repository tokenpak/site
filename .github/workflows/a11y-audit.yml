name: a11y-audit

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to audit (default: https://tokenpak.ai)'
        required: false
        default: 'https://tokenpak.ai'
      tolerate:
        description: 'Treat findings as non-fatal (upload artifacts only)'
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly Monday 08:00 UTC — regression detection.
    - cron: '0 8 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers (Chromium + Firefox + WebKit)
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run audit (cross-browser)
        env:
          AUDIT_BASE_URL: ${{ github.event.inputs.base_url || 'https://tokenpak.ai' }}
          AUDIT_OUT_DIR: ${{ runner.temp }}/a11y-audit
          AUDIT_TOLERATE_FINDINGS: ${{ github.event.inputs.tolerate == 'true' && '1' || '' }}
        run: npm run audit:a11y
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-audit-xbrowser-${{ github.run_id }}
          path: ${{ runner.temp }}/a11y-audit
          retention-days: 30
      - name: Print summary to job log
        if: always()
        run: |
          if [ -f "${{ runner.temp }}/a11y-audit/index.md" ]; then
            head -60 "${{ runner.temp }}/a11y-audit/index.md"
          fi
