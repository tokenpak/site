name: sync-release-data

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [release-synced]
  schedule:
    # Safety net: resync daily at 07:15 UTC even if no dispatch fired.
    - cron: '15 7 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Regenerate data/releases.json
        env:
          # MAIN_REPO_TOKEN has cross-repo read on tokenpak/tokenpak;
          # falls back to the workflow's default GITHUB_TOKEN (which works
          # now that tokenpak/tokenpak is public but keeps the explicit
          # higher-priority secret in place for future visibility flips).
          GITHUB_TOKEN: ${{ secrets.MAIN_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/sync-releases.ts
      - name: Validate + build (smoke)
        run: npm run build
      - name: Commit + push if changed
        run: |
          if ! git diff --quiet -- data/releases.json; then
            git config user.name  "tokenpak"
            git config user.email "hello@tokenpak.ai"
            git add data/releases.json
            git commit -m "site(data): refresh releases.json from GitHub Releases"
            git push origin main
          else
            echo "releases.json unchanged; nothing to commit."
          fi
