name: sync-docs-links

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [docs-links-updated]
  schedule:
    # Safety net: resync daily at 07:30 UTC.
    - cron: '30 7 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Regenerate data/docs-links.json
        env:
          # MAIN_REPO_TOKEN has cross-repo read on tokenpak/docs (private
          # during Phase 1). Falls back to the workflow's default GITHUB_TOKEN
          # if the secret isn't set (no-op fallback that still 404s cleanly
          # per scripts/sync-docs-links.ts's tolerant handling).
          GITHUB_TOKEN: ${{ secrets.MAIN_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/sync-docs-links.ts
      - name: Validate + build (smoke)
        run: npm run build
      - name: Commit + push if changed
        id: commit
        run: |
          if ! git diff --quiet -- data/docs-links.json; then
            git config user.name  "tokenpak"
            git config user.email "hello@tokenpak.ai"
            git add data/docs-links.json
            git commit -m "site(data): refresh docs-links.json from tokenpak/docs"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs-links.json unchanged; nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger deploy if data changed
        if: steps.commit.outputs.changed == 'true'
        # Pushes authored by the workflow's default GITHUB_TOKEN do NOT
        # auto-trigger other workflows (GitHub's anti-loop rule). Fire
        # deploy.yml explicitly so live site picks up the new manifest.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY" --ref main
